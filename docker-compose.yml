# DEV ONLY — do NOT use in production. Bind ports to localhost, no TLS,
# predictable credentials. Use managed Postgres/Redis in production.
services:
  postgres:
    image: postgres:16-alpine
    container_name: lyrashield-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lyrashield
      POSTGRES_PASSWORD: lyrashield
      POSTGRES_DB: lyrashield
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lyrashield"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: lyrashield-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD:-lyrashield-dev-redis}"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-lyrashield-dev-redis}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: lyrashield-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-lyrashield}:${POSTGRES_PASSWORD:-lyrashield}@postgres:5432/${POSTGRES_DB:-lyrashield}?schema=public"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required — set it in .env or your environment}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:-http://localhost:3000}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
    working_dir: /app
    command: ["pnpm", "--filter", "@lyrashield/db", "migrate:deploy"]
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lyrashield-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-lyrashield}:${POSTGRES_PASSWORD:-lyrashield}@postgres:5432/${POSTGRES_DB:-lyrashield}?schema=public"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required — set it in .env or your environment}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:-http://localhost:3000}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-lyrashield-dev-redis}@redis:6379"
      NODE_ENV: "production"
      # OAuth providers (all optional — empty = disabled)
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      AZURE_AD_CLIENT_ID: "${AZURE_AD_CLIENT_ID:-}"
      AZURE_AD_CLIENT_SECRET: "${AZURE_AD_CLIENT_SECRET:-}"
      AZURE_AD_TENANT_ID: "${AZURE_AD_TENANT_ID:-}"
      # GitHub App (optional)
      GITHUB_APP_ID: "${GITHUB_APP_ID:-}"
      GITHUB_APP_SLUG: "${GITHUB_APP_SLUG:-}"
      GITHUB_APP_PRIVATE_KEY: "${GITHUB_APP_PRIVATE_KEY:-}"
      GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET:-}"
    ports:
      - "127.0.0.1:3000:3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: lyrashield-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-lyrashield}:${POSTGRES_PASSWORD:-lyrashield}@postgres:5432/${POSTGRES_DB:-lyrashield}?schema=public"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:-http://localhost:3000}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-lyrashield-dev-redis}@redis:6379"
      NODE_ENV: "production"
      GITHUB_APP_ID: "${GITHUB_APP_ID:-}"
      GITHUB_APP_PRIVATE_KEY: "${GITHUB_APP_PRIVATE_KEY:-}"
      GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET:-}"
      # Scan engine
      LYRASHIELD_LLM: "${LYRASHIELD_LLM:-}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LYRASHIELD_IMAGE: "${LYRASHIELD_IMAGE:-ghcr.io/uselyrashield/lyrashield-sandbox:1.0.0}"
      LYRASHIELD_ENGINE_PATH: "${LYRASHIELD_ENGINE_PATH:-lyrashield}"
    volumes:
      - ${LYRASHIELD_ENGINE_PATH:-../lyrashield-engine}:/opt/lyrashield-engine:ro
      - worker_runs:/app/lyrashield_runs
    working_dir: /app
    command: ["pnpm", "--filter", "@lyrashield/worker", "exec", "tsx", "src/index.ts"]

volumes:
  postgres_data:
  redis_data:
  worker_runs:
