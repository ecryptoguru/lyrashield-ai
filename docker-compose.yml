services:
  postgres:
    image: postgres:16-alpine
    container_name: lyrashield-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lyrashield
      POSTGRES_PASSWORD: lyrashield
      POSTGRES_DB: lyrashield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lyrashield"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lyrashield-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
