packages:
  - "apps/*"
  - "packages/*"

overrides:
  "@hono/node-server": "1.19.13"
  postcss: "8.5.16"

onlyBuiltDependencies:
  - "@prisma/engines"
  - "esbuild"
  - "msgpackr-extract"
  - "prisma"
  - "sharp"
  - "unrs-resolver"
allowBuilds:
  '@prisma/engines': true
  core-js: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  puppeteer: true
  sharp: true
  unrs-resolver: true
  workerd: true
minimumReleaseAgeExclude:
  - '@turbo/darwin-64@2.10.3'
  - '@turbo/darwin-arm64@2.10.3'
  - '@turbo/linux-64@2.10.3'
  - '@turbo/linux-arm64@2.10.3'
  - '@turbo/windows-64@2.10.3'
  - '@turbo/windows-arm64@2.10.3'
  - turbo@2.10.3
