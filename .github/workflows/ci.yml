name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: SCA & Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency vulnerability scan
        run: pnpm audit --audit-level=critical --prod

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-and-typecheck:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lyrashield
          POSTGRES_PASSWORD: lyrashield
          POSTGRES_DB: lyrashield
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://lyrashield:lyrashield@localhost:5432/lyrashield?schema=public"
      SHADOW_DATABASE_URL: "postgresql://lyrashield:lyrashield@localhost:5432/lyrashield_shadow?schema=public"
      REDIS_URL: "redis://localhost:6379"
      BETTER_AUTH_SECRET: "ci-test-secret-key-at-least-32-characters-long"
      BETTER_AUTH_URL: "http://127.0.0.1:3100"
      NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3100"
      TRUSTED_PROXY_IP_HEADER: "x-forwarded-for"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref }}-
            turbo-${{ runner.os }}-main-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Create shadow database
        run: docker exec "${{ job.services.postgres.id }}" psql -U lyrashield -d postgres -c 'CREATE DATABASE lyrashield_shadow;'

      - name: Migration drift check
        run: |
          pnpm --filter @lyrashield/db exec prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema ./prisma/schema.prisma \
            --exit-code

      - name: Run database migrations
        run: pnpm --filter @lyrashield/db migrate:deploy

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser E2E
        run: pnpm test:e2e

  deploy-marketing:
    name: Deploy Marketing to Cloudflare
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [security, lint-and-typecheck]
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-production
      url: https://lyrashieldai.com
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Detect marketing changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet "${{ github.event.before }}" "${{ github.sha }}" -- \
            apps/marketing package.json pnpm-lock.yaml pnpm-workspace.yaml turbo.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.changes.outputs.changed == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build production marketing Worker
        if: steps.changes.outputs.changed == 'true'
        env:
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
        run: pnpm --filter @lyrashield/marketing build

      - name: Apply D1 migrations and deploy
        if: steps.changes.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/marketing
          wranglerVersion: "4.110.0"
          command: |
            d1 migrations apply lyrashield-marketing-waitlist --remote --config dist/server/wrangler.json
            deploy --config dist/server/wrangler.json

      - name: Smoke production routes
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          for path in / /methodology /tools /robots.txt /sitemap-index.xml /llms.txt; do
            curl --fail --silent --show-error --retry 5 --retry-all-errors \
              "https://lyrashieldai.com${path}" > /dev/null
          done
          curl --silent --show-error --retry 5 --retry-all-errors \
            "https://lyrashieldai.com/api/waitlist/position?code=INVALID" \
            --output /dev/null --write-out '%{http_code}' | grep --quiet '^404$'
          curl --silent --show-error --head "https://www.lyrashieldai.com/tools?source=ci" \
            | grep --ignore-case --quiet '^location: https://lyrashieldai.com/tools?source=ci'
